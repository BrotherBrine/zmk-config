# ── Bluetooth ──────────────────────────────────────────────────────────────────
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y          # Max BLE TX power for range
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n   # Don't wipe bonds on boot

# ── Split transport ────────────────────────────────────────────────────────────
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y  # Report peripheral battery to host

# ── Battery / power ────────────────────────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y          # Enable battery % reporting to host OS
CONFIG_ZMK_BATTERY_LEVEL_TRIGGER_POS=0 # Send battery report on every change

# ── Sleep / deep sleep ─────────────────────────────────────────────────────────
CONFIG_ZMK_IDLE_TIMEOUT=30000           # Idle timeout: 30 s before display sleeps
CONFIG_ZMK_SLEEP=y                      # Enable deep sleep
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000   # Deep sleep after 15 min of inactivity

# ── USB ────────────────────────────────────────────────────────────────────────
CONFIG_ZMK_USB=y                        # Enable USB HID (wired connection)
CONFIG_ZMK_USB_LOGGING=n

# ── Logging (disable for production builds) ────────────────────────────────────
CONFIG_ZMK_LOG_LEVEL_WRN=y
CONFIG_LOG=n
CONFIG_ZMK_USB_LOGGING=n

# ── OLED / display (uncomment if you add a display) ───────────────────────────
# CONFIG_ZMK_DISPLAY=y
# CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
